<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agenda de reuniones · Naka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2f36; --muted:#646b75; --line:#dfe2e6;
    --brand:#4b5563; --brand-dark:#374151;
    --glass:rgba(255,255,255,.72); --glass-soft:rgba(255,255,255,.55); --glass-line:rgba(255,255,255,.95);
    --alta:#e26d6d; --media:#cfa15a; --baja:#6fae84;
    --shadow:0 6px 18px rgba(60,66,77,.10);
    --shadow-soft:0 4px 14px rgba(60,66,77,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Rubik',system-ui,sans-serif;color:var(--ink);font-size:16px;line-height:1.4;
    padding-bottom:96px;min-height:100vh;
    background:linear-gradient(165deg,#e7e9ec,#f5f6f8);background-attachment:fixed;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}

  header{
    background:linear-gradient(135deg,#3f4651,#717885);color:#fff;padding:18px 0 16px;margin-bottom:14px;
    position:sticky;top:0;z-index:20;box-shadow:0 4px 16px rgba(45,50,60,.18)
  }
  header .wrap{display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:18px;font-weight:600;margin:0;letter-spacing:-.2px}
  header h1 span{opacity:.6;font-weight:400}
  .whoami{font-size:12px;background:rgba(255,255,255,.22);padding:5px 11px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .whoami b{font-weight:600}

  .tabs{display:flex;gap:6px;margin-bottom:14px;background:rgba(255,255,255,.5);padding:4px;border-radius:13px;border:1px solid var(--glass-line)}
  .tab{flex:1;text-align:center;padding:9px;border-radius:10px;font-weight:500;font-size:14px;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit}
  .tab.active{background:#fff;color:var(--ink);box-shadow:var(--shadow-soft)}

  .fechabar{background:var(--glass-soft);border:1px solid var(--glass-line);backdrop-filter:blur(8px);border-radius:15px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:11px;flex-wrap:wrap;box-shadow:var(--shadow-soft)}
  .fechabar .ico{font-size:17px;filter:grayscale(1)}
  .fechabar label{font-size:13px;color:#5b6068;font-weight:500}
  .fecha-btn{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:7px 13px;background:#fff;color:var(--muted);cursor:pointer;font-weight:500}
  .fecha-btn.set{color:var(--ink);border-color:var(--brand)}
  .fechabar .countdown{margin-left:auto;font-size:11px;background:#5b6470;color:#fff;padding:5px 11px;border-radius:20px;font-weight:500}
  .reunion-box{background:var(--glass-soft);border:1px solid var(--glass-line);backdrop-filter:blur(8px);border-radius:16px;padding:13px 14px;margin-bottom:16px;box-shadow:var(--shadow-soft)}
  .reunion-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .reunion-head .ico{font-size:16px;filter:grayscale(1)}
  .reunion-title{font-size:13px;font-weight:600;color:var(--ink)}
  .reunion-head .countdown{margin-left:auto;font-size:11px;background:#5b6470;color:#fff;padding:5px 11px;border-radius:20px;font-weight:500}
  .reunion-grid{display:flex;gap:8px;flex-wrap:wrap}
  .rb-field{flex:1;min-width:92px;display:flex;flex-direction:column;gap:3px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 10px;text-align:left;font-family:inherit;cursor:pointer}
  .rb-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .rb-val{font-size:13px;color:var(--muted);font-weight:500}
  .rb-val.set{color:var(--ink)}
  .rb-time,.rb-sel{border:none;background:none;font-family:inherit;font-size:13px;color:var(--ink);outline:none;padding:0;font-weight:500;width:100%}
  .rb-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-top:9px}
  .rb-row > .rb-lbl{padding-top:6px;min-width:84px;flex-shrink:0}
  .rb-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .rb-chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 11px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--muted);font-weight:500}
  .rb-chip.sel{background:var(--brand);color:#fff;border-color:transparent}
  .dur-sel{border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px 11px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;cursor:pointer}
  .dur-tag{font-size:11px;color:var(--muted);background:#eef0f2;border-radius:20px;padding:2px 8px;font-weight:500}
  .conf-badge{font-size:10px;font-weight:600;background:#e7f1ea;color:#3f7a55;padding:2px 9px;border-radius:20px}
  .confirmar-btn{display:block;width:100%;margin-top:13px;background:var(--brand);color:#fff;border:none;border-radius:11px;padding:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 7px rgba(75,85,99,.25);transition:transform .1s ease}
  .confirmar-btn:active{transform:scale(.98)}
  .confirmar-btn.confirmada{background:#e7f1ea;color:#3f7a55;box-shadow:none}

  /* Calendario iOS */
  .cal{text-align:left}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-title{font-size:16px;font-weight:600;color:var(--ink)}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{width:34px;height:34px;border-radius:50%;background:#eef0f2;border:none;font-size:18px;cursor:pointer;color:var(--brand-dark);display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
  .cal-nav button:active{background:#e2e5e9}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:6px}
  .cal-wd{font-size:11px;color:var(--muted);text-align:center;padding-bottom:6px;font-weight:600}
  .cal-day{position:relative;justify-self:center;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;cursor:pointer;color:var(--ink);border:none;background:none;font-family:inherit;transition:background .12s ease}
  .cal-day.empty{visibility:hidden;cursor:default}
  .cal-day.today{color:var(--brand-dark);font-weight:700}
  .cal-day.reunion::after{content:"";position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--media)}
  .cal-day.sel{background:var(--brand);color:#fff;font-weight:600}
  .cal-day.sel.reunion::after{background:#fff}
  .cal-legend{font-size:11px;color:var(--muted);margin-top:12px;display:flex;align-items:center;gap:6px}
  .cal-legend i{width:5px;height:5px;border-radius:50%;background:var(--media);display:inline-block}
  .cal-day:not(.sel):not(.empty):hover{background:#eef0f2}

  .addbox{background:var(--glass);border:1px solid var(--glass-line);backdrop-filter:blur(8px);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:16px}
  .addbox textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-family:inherit;font-size:15px;resize:none;color:var(--ink);outline:none;background:#fff}
  .addbox textarea:focus{border-color:var(--brand)}
  .detalle-toggle{font-size:13px;color:var(--brand-dark);font-weight:500;cursor:pointer;display:inline-block;margin:9px 2px}
  .detalle-wrap{display:none;margin-top:4px}
  .detalle-wrap.open{display:block}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px}
  .label{font-size:12px;color:var(--muted);width:100%;margin-bottom:-4px;font-weight:500}
  .seg{display:flex;gap:6px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--muted);font-weight:500}
  .chip.sel{color:#fff;border-color:transparent}
  .chip.p-alta.sel{background:var(--alta)} .chip.p-media.sel{background:var(--media)} .chip.p-baja.sel{background:var(--baja)}
  .chip.who.sel{background:var(--brand);color:#fff}
  .addbtn{width:100%;margin-top:13px;background:var(--brand);color:#fff;border:none;padding:12px;border-radius:12px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 7px rgba(75,85,99,.25)}
  .addbtn:active{background:var(--brand-dark)}

  .counter{margin:6px 4px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .lh-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
  .lh-title .lh-sep{color:var(--line);font-weight:400;margin:0 3px}
  .lh-prog{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap}
  .filtros{display:flex;gap:6px;flex-wrap:wrap;margin:0 4px 12px}
  .filtro-chip{border:1px solid var(--line);background:rgba(255,255,255,.6);border-radius:20px;padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--muted);font-weight:500}
  .filtro-chip.sel{background:var(--brand);color:#fff;border-color:transparent}
  .pdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .pdot.alta{background:var(--alta)} .pdot.media{background:var(--media)} .pdot.baja{background:var(--baja)}
  .buscar{width:100%;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-family:inherit;font-size:14px;outline:none;background:rgba(255,255,255,.7);margin-bottom:12px;color:var(--ink)}
  .buscar:focus{border-color:var(--brand)}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .toolbar .buscar{flex:1;width:auto;margin-bottom:0}
  .meta-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 4px 10px}
  .meta-count{font-size:12px;color:var(--muted);font-weight:500}
  .btn-filtros{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;white-space:nowrap}
  .btn-filtros.on{background:var(--brand);color:#fff;border-color:transparent}
  .filtros-wrap{margin-bottom:4px}
  .edit{margin-left:auto;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;padding:0}
  .edit svg,.del svg{width:18px;height:18px}
  @media(hover:hover){.edit:hover{background:#eef0f2;color:var(--brand-dark)} .del:hover{background:#fbeaea;color:#b06a6a}}
  .edit:active{color:var(--brand-dark)} .del:active{color:#b06a6a}
  .share-btn{display:inline-flex;align-items:center;gap:6px;background:#25d366;color:#fff;border:none;border-radius:11px;padding:10px 15px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;box-shadow:0 2px 7px rgba(37,211,102,.3)}
  .share-btn:active{transform:scale(.98)}
  .vista-toggle{display:flex;justify-content:flex-end;margin:0 4px 12px}
  .vista-seg{display:flex;gap:3px;background:#e3e6ea;border-radius:9px;padding:3px}
  .vista-seg button{border:none;background:none;font-family:inherit;font-size:12px;padding:5px 13px;border-radius:7px;color:var(--muted);cursor:pointer;font-weight:500}
  .vista-seg button.sel{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  #lista.tablero{display:grid;grid-template-columns:repeat(3,minmax(228px,1fr));gap:12px;align-items:start;overflow-x:auto;padding-bottom:6px}
  .board-col{background:rgba(255,255,255,.32);border:1px solid var(--glass-line);border-radius:14px;padding:10px;min-width:0}
  .board-col-head{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:flex;align-items:center;gap:7px;margin:2px 2px 10px}
  .board-col-n{margin-left:auto;background:#e3e6ea;color:#5b6470;border-radius:20px;padding:1px 9px;font-size:11px}
  .board-empty{font-size:12px;color:#b9bec5;text-align:center;padding:18px 0}
  #lista.tablero .card{margin-bottom:10px}
  @media(min-width:780px){
    #lista.tablero{position:relative;left:50%;transform:translateX(-50%);width:min(94vw,1060px)}
  }
  .group-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:16px 4px 8px;display:flex;align-items:center;gap:7px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%}
  .dot.alta{background:var(--alta)} .dot.media{background:var(--media)} .dot.baja{background:var(--baja)}

  .card{background:var(--glass);border:1px solid var(--glass-line);backdrop-filter:blur(8px);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow);margin-bottom:9px;border-left:4px solid var(--line)}
  .card.alta{border-left-color:var(--alta)} .card.media{border-left-color:var(--media)} .card.baja{border-left-color:var(--baja)}
  .card.done{background:rgba(244,245,247,.7)}
  .card.done .titulo{text-decoration:line-through;color:var(--muted)}
  .card.done .detalle-text,.card.done .by{opacity:.65}
  .card-top{display:flex;align-items:flex-start;gap:10px}
  .check{flex-shrink:0;width:24px;height:24px;border-radius:8px;border:2px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:#fff}
  .check.on{background:var(--brand);border-color:var(--brand)}
  .check svg{width:14px;height:14px;display:none}
  .check.on svg{display:block}
  .titulo{font-weight:500;font-size:15px;flex:1;word-break:break-word}
  .vermas{font-size:13px;color:var(--brand-dark);cursor:pointer;font-weight:500;margin-top:5px;display:inline-block}
  .detalle-text{font-size:14px;color:#5b6068;margin-top:7px;display:none;white-space:pre-wrap}
  .detalle-text.open{display:block}
  .meta{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap}
  .meta-top{margin-top:0;margin-bottom:8px}
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;cursor:pointer}
  .badge.alta{background:#fbeaea;color:#b04a4a} .badge.media{background:#f6efe2;color:#9a7530} .badge.baja{background:#e7f1ea;color:#3f7a55}
  .by{font-size:12px;color:var(--muted)}
  .del{cursor:pointer;background:none;border:none;font-family:inherit;color:#9aa0a8;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;padding:0}
  .decision{margin-top:10px;width:100%;border:1px dashed var(--line);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:13px;resize:none;outline:none;color:var(--ink);background:#fff}
  .decision:focus{border-color:var(--brand);border-style:solid}
  .decision::placeholder{color:#aab0b8}

  .segui-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;background:#e8eaed;color:#4b5563;padding:2px 8px;border-radius:20px;vertical-align:middle;margin-left:6px}
  .chain{margin-top:9px;background:rgba(245,246,248,.85);border:1px solid var(--line);border-radius:11px;padding:8px 10px}
  .chain-head{font-size:12px;font-weight:600;color:#5b6470;cursor:pointer;display:flex;align-items:center;gap:6px}
  .chain-body{display:none;margin-top:4px}
  .chain-body.open{display:block}
  .chain-row{font-size:12px;color:#5b6068;padding:6px 0;border-top:1px dashed var(--line);white-space:pre-wrap}
  .chain-row b{color:var(--ink);font-weight:600}
  .subtemas{margin-top:10px;padding-left:2px}
  .subtema{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
  .subcheck{width:18px;height:18px;border-radius:6px;border:2px solid var(--line);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff}
  .subcheck.on{background:var(--baja);border-color:var(--baja)}
  .subcheck svg{width:11px;height:11px;display:none} .subcheck.on svg{display:block}
  .subtema.done span{text-decoration:line-through;color:var(--muted)}
  .subdel{margin-left:auto;color:#c2c6cc;cursor:pointer;font-size:15px;background:none;border:none;line-height:1;padding:0 4px}
  .add-sub{font-size:12px;color:var(--brand-dark);font-weight:500;cursor:pointer;margin-top:4px;display:inline-block}
  .segui-btn{display:block;width:100%;font-size:14px;color:#fff;font-weight:600;cursor:pointer;background:var(--brand);border:none;border-radius:11px;padding:11px;font-family:inherit;margin-top:12px;box-shadow:0 2px 7px rgba(75,85,99,.28)}
  .segui-btn:active{background:var(--brand-dark)}
  .segui-btn.done-state{background:#e8eaed;color:var(--brand-dark);box-shadow:none;cursor:default}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
  .empty .big{font-size:34px;margin-bottom:8px;filter:grayscale(.4)}

  .closebar{position:fixed;bottom:0;left:0;right:0;background:rgba(247,248,250,.9);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 14px;z-index:15;box-shadow:0 -2px 14px rgba(60,66,77,.07)}
  .closebar .wrap{padding:0}
  .closebtn{width:100%;background:var(--brand);color:#fff;border:none;padding:13px;border-radius:13px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 7px rgba(75,85,99,.25)}
  .closebtn:disabled{opacity:.4;box-shadow:none}

  .hist-item{background:var(--glass);border:1px solid var(--glass-line);backdrop-filter:blur(8px);border-radius:15px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .hist-item h3{margin:0;font-size:15px;font-weight:600}
  .hist-item p{margin:3px 0 0;font-size:13px;color:var(--muted)}
  .hist-item .arrow{color:var(--muted);font-size:20px}
  .hist-detail .card{cursor:default;border-left-color:var(--line)}
  .hist-detail .titulo{text-decoration:none}
  .hist-decision{font-size:13px;color:#4a4f57;margin-top:6px;padding-left:10px;border-left:3px solid var(--brand);white-space:pre-wrap}
  .hist-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:12px;margin-bottom:4px}
  .hist-detalle{font-size:14px;color:#4a4f57;white-space:pre-wrap}
  .back{font-size:14px;color:var(--brand-dark);font-weight:500;cursor:pointer;margin-bottom:12px;display:inline-block}

  .modal{position:fixed;inset:0;background:rgba(40,45,55,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.hidden{display:none}
  .sheet{background:#fff;border-radius:20px;padding:22px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(40,45,55,.3)}
  .sheet h2{margin:0 0 6px;font-size:18px}
  .sheet p{margin:0 0 16px;font-size:14px;color:var(--muted)}
  .sheet input{width:100%;text-align:center;font-size:22px;letter-spacing:6px;padding:12px;border:1px solid var(--line);border-radius:12px;font-family:inherit;outline:none;margin-bottom:14px;background:#fff}
  .sheet input:focus{border-color:var(--brand)}
  .sheet .who-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .who-avatars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px}
  .who-av{background:none;border:none;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 2px;border-radius:12px}
  .who-av:hover{background:#f1f3f5}
  .who-av-i{width:48px;height:48px;border-radius:50%;background:#e7ebf0;color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px}
  .who-av-n{font-size:12px;color:var(--ink);font-weight:500}
  .sheet .who-grid .chip{padding:12px;font-size:15px;justify-content:center}
  .sheet-btns{display:flex;gap:8px}
  .sheet button{flex:1;padding:12px;border-radius:12px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border:none}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-ghost{background:#eceef1;color:var(--ink)}
  .ed-puntos-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:left;margin:8px 2px 7px}
  .ed-punto{display:flex;gap:6px;align-items:center;margin-bottom:6px}
  .ed-punto input{flex:1;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;outline:none;background:#fff;text-align:left;letter-spacing:normal;margin-bottom:0}
  .ed-punto input:focus{border-color:var(--brand)}
  .ed-punto-del{width:28px;height:28px;border:none;background:#eef0f2;border-radius:8px;color:#8a8f98;font-size:16px;cursor:pointer;flex-shrink:0}
  .ed-add-punto{font-size:13px;color:var(--brand-dark);font-weight:500;background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 2px;display:inline-block}
  .err{color:var(--alta);font-size:13px;margin-top:-8px;margin-bottom:10px;min-height:16px}

  .estado{font-size:11px;color:var(--muted);text-align:center;margin:18px 0 4px;opacity:.85}
  .estado.off{color:var(--alta);opacity:1}

  /* Animaciones */
  @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes sheetIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes checkPop{0%{transform:scale(.5)}55%{transform:scale(1.18)}100%{transform:scale(1)}}
  #lista.lista-anim .card{animation:cardIn .34s cubic-bezier(.2,.7,.3,1) both}
  .view-anim .hist-item{animation:cardIn .32s cubic-bezier(.2,.7,.3,1) both}
  .card{transition:transform .15s ease, box-shadow .15s ease}
  @media(hover:hover){.card:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(60,66,77,.14)}}
  .check{transition:background .18s ease, border-color .18s ease}
  .check.pop{animation:checkPop .32s ease}
  .subcheck{transition:background .18s ease, border-color .18s ease}
  .chain-body,.detalle-wrap{transition:none}
  .sheet{animation:sheetIn .3s cubic-bezier(.2,.7,.3,1)}
  .addbtn,.closebtn,.segui-btn,.chip,.tab{transition:transform .1s ease, background .15s ease}
  .addbtn:active,.closebtn:active,.segui-btn:active{transform:scale(.98)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}

  /* Accesibilidad: áreas táctiles, contraste y foco de teclado */
  .add-sub,.vermas,.detalle-toggle,.back{padding:5px 4px;display:inline-block;min-height:30px;line-height:20px}
  .chip,.filtro-chip,.rb-chip,.vista-seg button{min-height:34px}
  .check{width:26px;height:26px}
  .subcheck{width:20px;height:20px}
  .subdel{color:#8a8f98;font-size:18px;padding:4px 8px;min-height:30px}
  .badge{min-height:24px;display:inline-flex;align-items:center}
  .detalle-text{color:#4a4f57}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>Agenda <span>· Naka</span></h1>
    <div class="whoami" id="whoami" role="button" tabindex="0" aria-label="Tu nombre / sesión" onclick="cambiarNombre()"></div>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" id="tab-prox" onclick="verTab('prox')">Próxima reunión</button>
    <button class="tab" id="tab-hist" onclick="verTab('hist')">Historial</button>
  </div>

  <div id="view-prox">
    <div class="reunion-box" id="reunionBox"></div>

    <div class="addbox">
      <textarea id="nuevoTitulo" rows="2" aria-label="Nuevo tema a tratar" placeholder="¿Qué tema querés tratar?"></textarea>
      <span class="detalle-toggle" onclick="toggleDetalleNuevo()" id="detalleToggle">+ descripción</span>
      <div class="detalle-wrap" id="detalleWrap">
        <textarea id="nuevoDetalle" rows="2" aria-label="Descripción del tema (opcional)" placeholder="Descripción o contexto (opcional)"></textarea>
      </div>
      <div class="row">
        <span class="label">Prioridad</span>
        <div class="seg" id="segPrioridad">
          <button class="chip p-alta" data-p="alta" onclick="selPrioridad(this)">Alta</button>
          <button class="chip p-media sel" data-p="media" onclick="selPrioridad(this)">Media</button>
          <button class="chip p-baja" data-p="baja" onclick="selPrioridad(this)">Baja</button>
        </div>
      </div>
      <div class="row">
        <span class="label">Duración estimada</span>
        <select class="dur-sel" id="durTema" onchange="durTemaSel=+this.value">
          <option value="0">— sin estimar</option>
          <option value="5">5 min</option>
          <option value="10">10 min</option>
          <option value="15">15 min</option>
          <option value="20">20 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">1 h</option>
        </select>
      </div>
      <button class="addbtn" onclick="agregarTema()">Agregar tema</button>
    </div>

    <div class="toolbar">
      <input id="buscar" class="buscar" type="text" aria-label="Buscar tema" placeholder="🔍 Buscar tema…" oninput="setBusqueda(this.value)">
      <div id="vistaToggle"></div>
    </div>
    <div class="meta-row" id="counter"></div>
    <div class="filtros-wrap" id="filtrosWrap" style="display:none">
      <div class="filtros" id="filtros"></div>
      <div class="filtros" id="filtrosPrio"></div>
    </div>
    <div id="lista"></div>
  </div>

  <div id="view-hist" style="display:none">
    <div id="histLista"></div>
    <div id="histDetalle" class="hist-detail" style="display:none"></div>
  </div>

  <div class="estado" id="estado" role="status" aria-live="polite">Conectando…</div>
</div>

<div class="closebar" id="closebar">
  <div class="wrap">
    <button class="closebtn" id="closebtn" onclick="cerrarReunion()">Cerrar reunión y archivar</button>
  </div>
</div>

<div class="modal hidden" id="modal" role="dialog" aria-modal="true" aria-label="Ventana de la agenda">
  <div class="sheet" id="sheetContent"></div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   CONFIG DEL EQUIPO
   ════════════════════════════════════════════════════════════════ */
const NOMBRES = ["Diego","Hernan","Martin","Gonzalo","Sofia","Mariela"];
const PARTICIPANTES = ["Diego","Hernan","Martin","Gonzalo","Sofia","Mariela"];
const UBICACIONES = ["Arias","General Paz"];
const DURS_REU = ["30 min","45 min","1 h","1 h 30","2 h","2 h 30","3 h"];
const PIN_OK  = "1234";                      // <-- CAMBIAR por el PIN real del equipo

const COL_TEMAS = "agenda_temas";
const COL_REU   = "agenda_reuniones";

let FB = null;
let prioridadSel = "media";
let durTemaSel = 0;
let state = { temas:[], reuniones:[], fechaReunion:"" };
let yo = localStorage.getItem("agenda_nombre") || null;
let animateNext = true;
let viewActual = "prox";
let filtroNombre = "";    // filtro por quién propuso el tema
let filtroPrioridad = ""; // filtro por prioridad
let busqueda = "";        // búsqueda de texto
let vistaModo = localStorage.getItem("agenda_vista") || "lista";  // "lista" | "tablero"
let filtrosAbiertos = false;  // panel de filtros plegable
let temasJson = "", reuJson = "";
let decTimers = {};
let pendingProxRender = false;

/* ---------- Firestore ---------- */
const fcol = (n)=>FB.collection(FB.fdb,n);
const fdoc = (n,id)=>FB.doc(FB.fdb,n,String(id));
const cfgDoc = ()=>FB.doc(FB.fdb,"agenda_config","main");

function initFirestore(){
  FB = window.FB;
  if(!FB){ setEstado("⚠ Falta pegar la config de Firebase en el archivo", true); return; }
  setEstado("Conectando…");

  FB.onSnapshot(fcol(COL_TEMAS), snap=>{
    const arr = snap.docs.map(d=>{ const x={...d.data(), id:d.id}; x.seguimiento=x.seguimiento||[]; x.subtemas=x.subtemas||[]; return x; });
    arr.sort((a,b)=> (a.creadoEn||0)-(b.creadoEn||0) || (a.id<b.id?-1:1));
    const j = JSON.stringify(arr);
    if(j===temasJson){ return; }
    temasJson = j; state.temas = arr;
    setEstado(navigator.onLine ? "● Sincronizado en la nube" : "● Sin conexión (se guardará al volver)", !navigator.onLine);
    if(viewActual==="prox") render(); else actualizarCloseBtn();
  }, err=>setEstado("⚠ Error de conexión", true));

  FB.onSnapshot(fcol(COL_REU), snap=>{
    const arr = snap.docs.map(d=>({...d.data(), id:d.id}));
    arr.sort((a,b)=> (b.creadoEn||0)-(a.creadoEn||0));
    const j = JSON.stringify(arr);
    if(j===reuJson){ return; }
    reuJson = j; state.reuniones = arr;
    if(viewActual==="hist") renderHist();
  });

  FB.onSnapshot(cfgDoc(), snap=>{
    const d = snap.exists() ? snap.data() : {};
    state.fechaReunion    = d.fechaReunion || "";
    state.horaInicio      = d.horaInicio || "";
    state.duracionReunion = d.duracionReunion || "";
    state.ubicacion       = d.ubicacion || "";
    state.participantes   = d.participantes || [];
    state.reunionConfirmada = !!d.reunionConfirmada;
    renderReunion();
  });
}

function setEstado(txt, off){
  const e=document.getElementById("estado");
  if(e){ e.textContent=txt; e.className = "estado"+(off?" off":""); }
}
window.addEventListener("online",  ()=>setEstado("● Sincronizado en la nube", false));
window.addEventListener("offline", ()=>setEstado("● Sin conexión (se guardará al volver)", true));
// Accesibilidad: Enter/Espacio activan los elementos con rol (check, botón) que no son <button>.
document.addEventListener("keydown", function(e){
  const el=document.activeElement; if(!el || !el.getAttribute) return;
  const role=el.getAttribute("role");
  if((role==="checkbox"||role==="button") && (e.key==="Enter"||e.key===" ")){ e.preventDefault(); el.click(); }
});

/* ---------- PIN ---------- */
function pedirPin(){
  document.getElementById("sheetContent").innerHTML = `
    <h2>🔒 Acceso</h2>
    <p>Ingresá el PIN compartido del equipo</p>
    <input id="pinInput" type="tel" maxlength="4" placeholder="••••" inputmode="numeric">
    <div class="err" id="pinErr"></div>
    <div class="sheet-btns"><button class="btn-primary" onclick="chequearPin()">Entrar</button></div>`;
  showModal();
  setTimeout(()=>document.getElementById("pinInput").focus(),100);
  document.getElementById("pinInput").addEventListener("keydown",e=>{if(e.key==="Enter")chequearPin();});
}
function chequearPin(){
  const v = document.getElementById("pinInput").value;
  if(v===PIN_OK){ localStorage.setItem("agenda_pin_ok","1"); hideModal(); if(!yo) pedirNombre(); }
  else document.getElementById("pinErr").textContent = "PIN incorrecto";
}

/* ---------- Nombre ---------- */
function pedirNombre(){
  document.getElementById("sheetContent").innerHTML = `
    <h2>Identificate</h2>
    <p>Elegí tu nombre para entrar</p>
    <div class="who-avatars">${NOMBRES.map(n=>`
      <button class="who-av" onclick="setNombre('${n}')">
        <span class="who-av-i">${esc(n.charAt(0))}</span>
        <span class="who-av-n">${esc(n)}</span>
      </button>`).join("")}</div>`;
  showModal();
}
function setNombre(n){ yo=n; localStorage.setItem("agenda_nombre",n); hideModal(); render(); }
function cambiarNombre(){ pedirNombre(); }

/* ---------- Modal helpers ---------- */
function showModal(){ document.getElementById("modal").classList.remove("hidden"); const s=document.getElementById("sheetContent"); s.style.animation="none"; void s.offsetWidth; s.style.animation=""; }
function hideModal(){ document.getElementById("modal").classList.add("hidden"); }

/* ---------- Fecha de reunión + calendario iOS ---------- */
let calY, calM;
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const WD=["L","M","X","J","V","S","D"];
function pad(n){ return String(n).padStart(2,"0"); }

function fechaLinda(){
  if(!state.fechaReunion) return "";
  const [y,m,d]=state.fechaReunion.split("-");
  return `${d}/${m}/${y}`;
}
function countdownTexto(){
  if(!state.fechaReunion) return "";
  const [y,m,d]=state.fechaReunion.split("-").map(Number);
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const dias=Math.round((new Date(y,m-1,d)-hoy)/86400000);
  return dias<0? `hace ${-dias} día${dias!=-1?"s":""}` : dias===0? "¡es hoy!" : dias===1? "mañana" : `faltan ${dias} días`;
}
function minLabel(m){ m=+m||0; if(!m) return ""; if(m<60) return m+" min"; const h=Math.floor(m/60), mm=m%60; return mm? h+" h "+mm : h+" h"; }

function renderReunion(){
  const box=document.getElementById("reunionBox");
  if(!box) return;
  const cd=countdownTexto();
  const parts=state.participantes||[];
  box.innerHTML = `
    <div class="reunion-head">
      <span class="ico">📅</span><span class="reunion-title">Próxima reunión</span>
      ${state.reunionConfirmada?'<span class="conf-badge">✓ confirmada</span>':""}
      ${cd?`<span class="countdown">${cd}</span>`:""}
    </div>
    <div class="reunion-grid">
      <button class="rb-field" onclick="abrirCalendario()">
        <span class="rb-lbl">Fecha</span>
        <span class="rb-val ${state.fechaReunion?'set':''}">${fechaLinda()||"Elegir"}</span>
      </button>
      <div class="rb-field">
        <span class="rb-lbl">Inicio</span>
        <input type="time" class="rb-time" value="${state.horaInicio||""}" onchange="setReunion('horaInicio',this.value)">
      </div>
      <div class="rb-field">
        <span class="rb-lbl">Duración</span>
        <select class="rb-sel" onchange="setReunion('duracionReunion',this.value)">
          <option value="" ${!state.duracionReunion?'selected':''}>—</option>
          ${DURS_REU.map(x=>`<option value="${x}" ${state.duracionReunion===x?'selected':''}>${x}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="rb-row">
      <span class="rb-lbl">Ubicación</span>
      <div class="rb-chips">${UBICACIONES.map(u=>`<button class="rb-chip ${state.ubicacion===u?'sel':''}" onclick="setUbicacion('${u}')">${u}</button>`).join("")}</div>
    </div>
    <div class="rb-row">
      <span class="rb-lbl">Participantes</span>
      <div class="rb-chips">${PARTICIPANTES.map(p=>`<button class="rb-chip ${parts.includes(p)?'sel':''}" onclick="toggleParticipante('${p}')">${p}</button>`).join("")}</div>
    </div>
    <button class="confirmar-btn ${state.reunionConfirmada?'confirmada':''}" onclick="toggleConfirmar()">${state.reunionConfirmada?"✓ Reunión confirmada":"Confirmar reunión"}</button>`;
}
function toggleConfirmar(){
  if(!state.reunionConfirmada && !state.fechaReunion){ alert("Primero elegí la fecha de la reunión."); return; }
  const v=!state.reunionConfirmada;
  state.reunionConfirmada=v; if(FB) FB.setDoc(cfgDoc(),{reunionConfirmada:v},{merge:true}); renderReunion();
}
// Guarda cambios de la reunión y, si estaba confirmada, la desconfirma (el dato cambió).
function guardarConfig(upd){
  if(state.reunionConfirmada){ state.reunionConfirmada=false; upd.reunionConfirmada=false; }
  if(FB) FB.setDoc(cfgDoc(),upd,{merge:true});
}
function setReunion(field,val){ state[field]=val; guardarConfig({[field]:val}); renderReunion(); }
function setUbicacion(u){ setReunion("ubicacion", state.ubicacion===u? "" : u); }
function toggleParticipante(p){
  let arr=state.participantes||[];
  arr = arr.includes(p)? arr.filter(x=>x!==p) : [...arr,p];
  state.participantes=arr; guardarConfig({participantes:arr}); renderReunion();
}

function abrirCalendario(){
  let base;
  if(state.fechaReunion){ const [y,m,d]=state.fechaReunion.split("-").map(Number); base=new Date(y,m-1,d); }
  else base=new Date();
  calY=base.getFullYear(); calM=base.getMonth();
  renderCalendario(); showModal();
}
function calMove(delta){
  calM+=delta;
  if(calM<0){ calM=11; calY--; }
  if(calM>11){ calM=0; calY++; }
  renderCalendario();
}
function renderCalendario(){
  const first=new Date(calY,calM,1);
  const startDow=(first.getDay()+6)%7;
  const dias=new Date(calY,calM+1,0).getDate();
  const hoy=new Date(); const hoyStr=`${hoy.getFullYear()}-${pad(hoy.getMonth()+1)}-${pad(hoy.getDate())}`;
  const reuSet=new Set((state.reuniones||[]).map(r=>{ const p=(r.fecha||"").split("/"); return p.length===3?`${p[2]}-${pad(+p[1])}-${pad(+p[0])}`:""; }));
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<button class="cal-day empty"></button>`;
  for(let d=1;d<=dias;d++){
    const ds=`${calY}-${pad(calM+1)}-${pad(d)}`;
    const cls=["cal-day"];
    if(ds===hoyStr) cls.push("today");
    if(reuSet.has(ds)) cls.push("reunion");
    if(ds===state.fechaReunion) cls.push("sel");
    cells+=`<button class="${cls.join(' ')}" onclick="elegirDia('${ds}')">${d}</button>`;
  }
  document.getElementById("sheetContent").innerHTML=`
    <div class="cal">
      <div class="cal-head">
        <div class="cal-title">${MESES[calM]} ${calY}</div>
        <div class="cal-nav"><button aria-label="Mes anterior" onclick="calMove(-1)">‹</button><button aria-label="Mes siguiente" onclick="calMove(1)">›</button></div>
      </div>
      <div class="cal-grid">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join("")}${cells}</div>
      ${reuSet.size?`<div class="cal-legend"><i></i> día con reunión</div>`:''}
      <div class="sheet-btns" style="margin-top:16px">
        <button class="btn-ghost" onclick="hideModal()">Cancelar</button>
        ${state.fechaReunion?`<button class="btn-ghost" onclick="quitarFecha()">Quitar fecha</button>`:''}
      </div>
    </div>`;
}
function elegirDia(ds){ state.fechaReunion=ds; hideModal(); guardarFecha(ds); renderReunion(); }
function quitarFecha(){ state.fechaReunion=""; hideModal(); guardarFecha(""); renderReunion(); }
function guardarFecha(v){ guardarConfig({fechaReunion:v}); }

/* ---------- Agregar ---------- */
function selPrioridad(btn){
  prioridadSel = btn.dataset.p;
  document.querySelectorAll("#segPrioridad .chip").forEach(c=>c.classList.remove("sel"));
  btn.classList.add("sel");
}
function toggleDetalleNuevo(){
  const w=document.getElementById("detalleWrap");
  w.classList.toggle("open");
  document.getElementById("detalleToggle").textContent = w.classList.contains("open")?"– descripción":"+ descripción";
}
function agregarTema(){
  if(!FB){ alert("Todavía no está configurado Firebase."); return; }
  const t = document.getElementById("nuevoTitulo").value.trim();
  if(!t){ document.getElementById("nuevoTitulo").focus(); return; }
  const d = document.getElementById("nuevoDetalle").value.trim();
  const nuevo = {
    titulo:t, detalle:d, prioridad:prioridadSel, propuestoPor:yo, duracionEst:durTemaSel||0,
    tratado:false, decision:"", creadoEn:Date.now(),
    esSeguimiento:false, seguido:false, seguimiento:[], subtemas:[]
  };
  document.getElementById("nuevoTitulo").value="";
  document.getElementById("nuevoDetalle").value="";
  const w=document.getElementById("detalleWrap"); w.classList.remove("open");
  document.getElementById("detalleToggle").textContent="+ descripción";
  durTemaSel=0; const dsel=document.getElementById("durTema"); if(dsel) dsel.value="0";
  animateNext=true;
  FB.addDoc(fcol(COL_TEMAS), nuevo);
}

/* ---------- Acciones sobre temas (optimista + escritura a Firestore) ---------- */
function temaById(id){ return state.temas.find(t=>t.id===id); }
function toggleTratado(id){
  const x=temaById(id); if(!x) return; x.tratado=!x.tratado; const on=x.tratado;
  render(); if(on){ const el=document.getElementById('chk_'+id); if(el) el.classList.add('pop'); }
  FB.updateDoc(fdoc(COL_TEMAS,id),{tratado:on});
}
function setDecision(id,val){
  const x=temaById(id); if(x) x.decision=val; actualizarCloseBtn();
  clearTimeout(decTimers[id]);
  decTimers[id]=setTimeout(()=>{ FB.updateDoc(fdoc(COL_TEMAS,id),{decision:val}); }, 600);
}
function ciclarPrioridad(id){
  const orden=["alta","media","baja"]; const x=temaById(id); if(!x) return;
  x.prioridad = orden[(orden.indexOf(x.prioridad)+1)%3]; render();
  FB.updateDoc(fdoc(COL_TEMAS,id),{prioridad:x.prioridad});
}
function borrarTema(id){
  confirmar("¿Borrar este tema?","Borrar",()=>{
    state.temas=state.temas.filter(t=>t.id!==id); render();
    FB.deleteDoc(fdoc(COL_TEMAS,id));
  });
}
function toggleVerMas(id){
  const el=document.getElementById("det_"+id); const lk=document.getElementById("ver_"+id);
  el.classList.toggle("open"); lk.textContent = el.classList.contains("open")?"ver menos":"ver más";
}

/* ---------- Render lista ---------- */
const NOM_PRIO={alta:"Alta",media:"Media",baja:"Baja"};
function render(){
  const ae=document.activeElement;
  if(ae && ae.classList && ae.classList.contains("decision")){
    pendingProxRender=true;
    ae.addEventListener("blur", ()=>{ if(pendingProxRender){ pendingProxRender=false; render(); } }, {once:true});
    actualizarCloseBtn(); return;
  }
  document.getElementById("whoami").innerHTML = yo? `<span>👤</span><b>${yo}</b>` : `<span>👤 Elegir</span>`;
  const cont=document.getElementById("lista");
  const todos=state.temas;
  const total=todos.length, hechos=todos.filter(t=>t.tratado).length;
  const totMin=todos.reduce((s,t)=>s+(+t.duracionEst||0),0);

  const nFilt = (filtroNombre?1:0)+(filtroPrioridad?1:0);
  document.getElementById("counter").innerHTML = total
    ? `<span class="meta-count">${total} tema${total!=1?"s":""} · ${hechos} tratado${hechos!=1?"s":""}${totMin?` · ≈ ${minLabel(totMin)}`:""}</span><button class="btn-filtros ${nFilt?'on':''}" aria-expanded="${filtrosAbiertos?'true':'false'}" onclick="toggleFiltros()">Filtros${nFilt?` (${nFilt})`:""} ${filtrosAbiertos?"▴":"▾"}</button>`
    : "";

  renderFiltros();
  renderFiltrosPrio();
  renderVistaToggle();
  document.getElementById("filtrosWrap").style.display = (total && filtrosAbiertos) ? "block" : "none";

  if(!total){
    cont.className="";
    cont.innerHTML = `<div class="empty"><div class="big">📝</div>No hay temas todavía.<br>Agregá el primero arriba.</div>`;
    animateNext=false; actualizarCloseBtn(); return;
  }

  let temas = todos;
  if(filtroNombre)    temas = temas.filter(t=>t.propuestoPor===filtroNombre);
  if(filtroPrioridad) temas = temas.filter(t=>t.prioridad===filtroPrioridad);
  const q = busqueda.trim().toLowerCase();
  if(q) temas = temas.filter(t=>(t.titulo+" "+(t.detalle||"")).toLowerCase().includes(q));
  temas = [...temas];
  if(!temas.length){
    cont.className="";
    cont.innerHTML = `<div class="empty"><div class="big">🔍</div>No hay temas que coincidan.</div>`;
    animateNext=false; actualizarCloseBtn(); return;
  }

  const grupos=["alta","media","baja"];
  let idx=0;

  if(vistaModo==="tablero"){
    let html="";
    grupos.forEach(g=>{
      const items = temas.filter(t=>t.prioridad===g)
        .sort((a,b)=> (a.tratado-b.tratado) || (a.creadoEn-b.creadoEn));
      html += `<div class="board-col">
        <div class="board-col-head"><span class="dot ${g}"></span>${NOM_PRIO[g]}<span class="board-col-n">${items.length}</span></div>
        ${items.length ? items.map(t=>cardHtml(t, idx++)).join("") : `<div class="board-empty">—</div>`}
      </div>`;
    });
    cont.className = "tablero" + (animateNext?" lista-anim":"");
    cont.innerHTML = html;
    animateNext=false; actualizarCloseBtn(); return;
  }

  let html="";
  grupos.forEach(g=>{
    const items = temas.filter(t=>t.prioridad===g)
      .sort((a,b)=> (a.tratado-b.tratado) || (a.creadoEn-b.creadoEn));
    if(!items.length) return;
    html += `<div class="group-label"><span class="dot ${g}"></span>${NOM_PRIO[g]}</div>`;
    items.forEach(t=> html += cardHtml(t, idx++));
  });
  cont.className = animateNext ? "lista-anim" : "";
  cont.innerHTML=html;
  animateNext=false;
  actualizarCloseBtn();
}
function actualizarCloseBtn(){
  const hechos = state.temas.filter(t=>t.tratado).length;
  const btn=document.getElementById("closebtn");
  btn.disabled = hechos===0;
  btn.textContent = hechos? `Cerrar reunión y archivar (${hechos})` : "Cerrar reunión y archivar";
}

/* ---------- Filtro por nombre ---------- */
function renderFiltros(){
  const cont=document.getElementById("filtros");
  if(!cont) return;
  if(!state.temas.length){ cont.innerHTML=""; return; }
  let chips = `<button class="filtro-chip ${!filtroNombre?'sel':''}" onclick="setFiltro('')">Todos</button>`;
  NOMBRES.forEach(n=>{
    const cnt = state.temas.filter(t=>t.propuestoPor===n).length;
    if(!cnt) return;
    chips += `<button class="filtro-chip ${filtroNombre===n?'sel':''}" onclick="setFiltro('${n}')">${n} (${cnt})</button>`;
  });
  cont.innerHTML = chips;
}
function setFiltro(n){ filtroNombre=n; animateNext=true; render(); }
function renderFiltrosPrio(){
  const cont=document.getElementById("filtrosPrio");
  if(!cont) return;
  if(!state.temas.length){ cont.innerHTML=""; return; }
  const base = filtroNombre ? state.temas.filter(t=>t.propuestoPor===filtroNombre) : state.temas;
  let chips = `<button class="filtro-chip ${!filtroPrioridad?'sel':''}" onclick="setFiltroPrio('')">Todas</button>`;
  ["alta","media","baja"].forEach(p=>{
    const cnt = base.filter(t=>t.prioridad===p).length;
    if(!cnt) return;
    chips += `<button class="filtro-chip ${filtroPrioridad===p?'sel':''}" onclick="setFiltroPrio('${p}')"><span class="pdot ${p}"></span>${NOM_PRIO[p]} (${cnt})</button>`;
  });
  cont.innerHTML = chips;
}
function setFiltroPrio(p){ filtroPrioridad=p; animateNext=true; render(); }
function setBusqueda(v){ busqueda=v; render(); }

/* ---------- Vista Lista / Tablero ---------- */
function renderVistaToggle(){
  const c=document.getElementById("vistaToggle");
  if(!c) return;
  if(!state.temas.length){ c.innerHTML=""; return; }
  c.innerHTML = `<div class="vista-seg" role="group" aria-label="Vista de temas">
    <button class="${vistaModo==='lista'?'sel':''}" aria-pressed="${vistaModo==='lista'}" onclick="setVista('lista')">Lista</button>
    <button class="${vistaModo==='tablero'?'sel':''}" aria-pressed="${vistaModo==='tablero'}" onclick="setVista('tablero')">Tablero</button>
  </div>`;
}
function setVista(m){ vistaModo=m; localStorage.setItem("agenda_vista",m); animateNext=true; render(); }
function toggleFiltros(){ filtrosAbiertos=!filtrosAbiertos; render(); }

/* ---------- HTML de una tarjeta (reutilizable en lista y tablero) ---------- */
function cardHtml(t, idx){
  const g=t.prioridad;
  return `
      <div class="card ${g} ${t.tratado?'done':''}" style="animation-delay:${Math.min(idx,10)*40}ms">
        <div class="card-top">
          <div class="check ${t.tratado?'on':''}" id="chk_${t.id}" role="checkbox" tabindex="0" aria-checked="${t.tratado?'true':'false'}" aria-label="Marcar tema como tratado" onclick="toggleTratado('${t.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg>
          </div>
          <div style="flex:1">
            <div class="meta meta-top">
              <span class="badge ${g}" onclick="ciclarPrioridad('${t.id}')">${NOM_PRIO[g]}</span>
              ${t.duracionEst?`<span class="dur-tag">⏱ ${minLabel(t.duracionEst)}</span>`:""}
              <span class="by">${t.propuestoPor||"—"}</span>
              <button class="edit" aria-label="Editar tema" onclick="editarTema('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
              <button class="del" aria-label="Borrar tema" onclick="borrarTema('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
            </div>
            <div class="titulo">${esc(t.titulo)}${t.esSeguimiento?'<span class="segui-badge">📌 seguimiento</span>':''}</div>
            ${t.detalle?`<span class="vermas" id="ver_${t.id}" onclick="toggleVerMas('${t.id}')">ver más</span>
              <div class="detalle-text" id="det_${t.id}">${esc(t.detalle)}</div>`:""}
            ${chainHtml(t)}
            ${subtemasHtml(t)}
            <textarea class="decision" placeholder="¿Qué se decidió? (se guarda en el acta)"
              oninput="setDecision('${t.id}',this.value)">${esc(t.decision)}</textarea>
            ${t.tratado?`<button class="segui-btn ${t.seguido?'done-state':''}" onclick="${t.seguido?'':`hacerSeguimiento('${t.id}')`}">${t.seguido?'✓ Pasado a la próxima reunión':'↻ Hacer seguimiento →'}</button>`:''}
          </div>
        </div>
      </div>`;
}

/* ---------- Editar tema (título, descripción y puntos) ---------- */
let edit = null;
function editarTema(id){
  const t=temaById(id); if(!t) return;
  edit = {
    id,
    titulo: t.titulo,
    descripcion: t.detalle||"",
    puntos: (t.subtemas||[]).map(s=>({id:s.id, titulo:s.titulo, hecho:!!s.hecho}))
  };
  renderEditModal();
  showModal();
  setTimeout(()=>{ const e=document.getElementById("edTit"); if(e) e.focus(); },100);
}
function capturarEdit(){
  if(!edit) return;
  const tit=document.getElementById("edTit"); if(tit) edit.titulo=tit.value;
  const des=document.getElementById("edDet"); if(des) edit.descripcion=des.value;
  edit.puntos.forEach((p,i)=>{ const inp=document.getElementById("edPt_"+i); if(inp) p.titulo=inp.value; });
}
function renderEditModal(){
  const puntos = edit.puntos.map((p,i)=>`
      <div class="ed-punto">
        <input id="edPt_${i}" type="text" value="${esc(p.titulo)}" placeholder="Punto">
        <button class="ed-punto-del" onclick="edBorrarPunto(${i})" aria-label="Quitar punto">×</button>
      </div>`).join("");
  document.getElementById("sheetContent").innerHTML=`
    <h2>Editar tema</h2>
    <input id="edTit" type="text" value="${esc(edit.titulo)}" placeholder="Título del tema" style="font-size:15px;letter-spacing:normal;text-align:left;margin-bottom:10px">
    <textarea id="edDet" placeholder="Descripción (opcional)" style="width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-family:inherit;font-size:14px;resize:none;outline:none;margin-bottom:8px;min-height:64px;background:#fff;color:var(--ink)">${esc(edit.descripcion)}</textarea>
    <div class="ed-puntos-lbl">Puntos</div>
    <div id="edPuntos">${puntos}</div>
    <button class="ed-add-punto" onclick="edAgregarPunto()">+ agregar punto</button>
    <div class="sheet-btns" style="margin-top:14px">
      <button class="btn-ghost" onclick="hideModal()">Cancelar</button>
      <button class="btn-primary" onclick="edGuardar()">Guardar</button>
    </div>`;
}
function edAgregarPunto(){ capturarEdit(); edit.puntos.push({id:genId(), titulo:"", hecho:false}); renderEditModal(); const inp=document.getElementById("edPt_"+(edit.puntos.length-1)); if(inp) inp.focus(); }
function edBorrarPunto(i){ capturarEdit(); edit.puntos.splice(i,1); renderEditModal(); }
function edGuardar(){
  capturarEdit();
  const t=temaById(edit.id); if(!t) return;
  const nt=(edit.titulo||"").trim();
  if(!nt){ const e=document.getElementById("edTit"); if(e) e.focus(); return; }
  const puntos = edit.puntos.map(p=>({id:p.id||genId(), titulo:(p.titulo||"").trim(), hecho:!!p.hecho})).filter(p=>p.titulo);
  t.titulo=nt; t.detalle=(edit.descripcion||"").trim(); t.subtemas=puntos;
  const eid=edit.id; edit=null; hideModal(); render();
  FB.updateDoc(fdoc(COL_TEMAS,eid),{titulo:nt, detalle:t.detalle, subtemas:puntos});
}

/* ---------- Compartir acta por WhatsApp ---------- */
function actaTexto(r){
  let s = `*Acta de reunion - ${r.fecha}*\n\n`;
  r.temas.forEach((t,i)=>{
    s += `${i+1}. ${t.titulo} (${NOM_PRIO[t.prioridad]})\n`;
    s += t.decision ? `   - ${t.decision}\n` : `   - (sin nota)\n`;
    (t.subtemas||[]).forEach(st=> s += `      ${st.hecho?'[x]':'[ ]'} ${st.titulo}\n`);
  });
  s += `\n- Agenda Naka`;
  return s;
}
function compartirActa(id){
  const r=state.reuniones.find(x=>x.id===id); if(!r) return;
  const txt=actaTexto(r);
  // Abre WhatsApp directo: app en el celular, WhatsApp Web en la compu.
  window.open("https://wa.me/?text="+encodeURIComponent(txt), "_blank");
}

/* ---------- Cerrar reunión ---------- */
function cerrarReunion(){
  const tratados = state.temas.filter(t=>t.tratado);
  if(!tratados.length) return;
  const pend = state.temas.length - tratados.length;
  // Tratados con puntos pendientes (y que no se hicieron seguimiento a mano) -> se arrastran solos.
  const arrastrar = tratados.filter(t=>!t.seguido && (t.subtemas||[]).some(s=>!s.hecho));
  confirmar(
    `Se archivarán ${tratados.length} tema${tratados.length!=1?"s":""} tratado${tratados.length!=1?"s":""} en el historial.` +
    (arrastrar.length?`<br>${arrastrar.length} con puntos pendientes pasan a la próxima como seguimiento.`:"") +
    (pend?`<br>Los ${pend} pendiente${pend!=1?"s":""} pasan a la próxima reunión.`:""),
    "Cerrar reunión",
    ()=>{
      let fechaTxt;
      if(state.fechaReunion){ const [y,m,d]=state.fechaReunion.split("-"); fechaTxt=`${d}/${m}/${y}`; }
      else fechaTxt=new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
      const reunion = {
        fecha:fechaTxt, creadoEn:Date.now(),
        temas:tratados.map(t=>({titulo:t.titulo,detalle:t.detalle,prioridad:t.prioridad,propuestoPor:t.propuestoPor,decision:t.decision,esSeguimiento:t.esSeguimiento||false,seguimiento:t.seguimiento||[],subtemas:t.subtemas||[]}))
      };
      const batch = FB.writeBatch(FB.fdb);
      const ref = FB.doc(fcol(COL_REU));
      batch.set(ref, reunion);
      tratados.forEach(t=> batch.delete(fdoc(COL_TEMAS, t.id)) );
      // Arrastrar a la próxima reunión los tratados con puntos pendientes (seguimiento automático).
      arrastrar.forEach((t,i)=>{
        const nref = FB.doc(fcol(COL_TEMAS));
        batch.set(nref, {
          titulo:t.titulo, detalle:t.detalle||"", prioridad:t.prioridad, propuestoPor:t.propuestoPor,
          tratado:false, decision:"", creadoEn:Date.now()+i,
          esSeguimiento:true, seguido:false,
          seguimiento:[...(t.seguimiento||[]), {fecha:fechaTxt, decision:t.decision||"(sin nota)"}],
          subtemas:(t.subtemas||[]).filter(s=>!s.hecho).map(s=>({id:genId(), titulo:s.titulo, hecho:false}))
        });
      });
      batch.set(cfgDoc(), {fechaReunion:""}, {merge:true});
      batch.commit();
      state.fechaReunion=""; renderReunion();
      verTab('hist');
    });
}

/* ---------- Historial ---------- */
function renderHist(){
  const c=document.getElementById("histLista");
  document.getElementById("histDetalle").style.display="none";
  c.style.display="block";
  if(!state.reuniones.length){
    c.className="";
    c.innerHTML=`<div class="empty"><div class="big">📚</div>Todavía no cerraste ninguna reunión.</div>`; return;
  }
  c.className="view-anim";
  c.innerHTML = state.reuniones.map((r,i)=>`
    <div class="hist-item" style="animation-delay:${Math.min(i,10)*45}ms" onclick="verReunion('${r.id}')">
      <div><h3>Reunión ${r.fecha}</h3><p>${r.temas.length} tema${r.temas.length!=1?"s":""} tratado${r.temas.length!=1?"s":""}</p></div>
      <span class="arrow">›</span>
    </div>`).join("");
}
function verReunion(id){
  const r=state.reuniones.find(x=>x.id===id); if(!r) return;
  const c=document.getElementById("histLista"); c.style.display="none";
  const d=document.getElementById("histDetalle"); d.style.display="block";
  d.innerHTML = `<span class="back" onclick="renderHist()">‹ Volver al historial</span>
    <h2 style="font-size:17px;margin:4px 0 12px">Reunión ${r.fecha}</h2>
    <button class="share-btn" onclick="compartirActa('${r.id}')">📲 Compartir acta por WhatsApp</button>` +
    r.temas.map(t=>`
      <div class="card ${t.prioridad}">
        <div class="meta meta-top"><span class="badge ${t.prioridad}">${NOM_PRIO[t.prioridad]}</span><span class="by">${t.propuestoPor||"—"}</span></div>
        <div class="titulo">${esc(t.titulo)}${t.esSeguimiento?'<span class="segui-badge">📌 seguimiento</span>':''}</div>
        ${t.detalle?`<div class="hist-label">Detalle</div><div class="hist-detalle">${esc(t.detalle)}</div>`:""}
        ${(t.seguimiento&&t.seguimiento.length)?`<div class="chain"><div class="chain-head" style="cursor:default">Historial previo</div><div class="chain-body open">${t.seguimiento.map(s=>`<div class="chain-row"><b>${s.fecha}:</b> ${esc(s.decision)}</div>`).join("")}</div></div>`:""}
        ${(t.subtemas&&t.subtemas.length)?`<div class="hist-label">Puntos</div><div class="subtemas">${t.subtemas.map(s=>`<div class="subtema ${s.hecho?'done':''}"><div class="subcheck ${s.hecho?'on':''}"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg></div><span>${esc(s.titulo)}</span></div>`).join("")}</div>`:""}
        <div class="hist-label">¿Qué se decidió?</div>
        ${t.decision?`<div class="hist-decision">${esc(t.decision)}</div>`:`<div class="hist-decision" style="border-color:#ddd;color:#9aa">Sin nota</div>`}
      </div>`).join("");
}

/* ---------- Tabs ---------- */
function verTab(t){
  const prox=t==="prox"; viewActual=t;
  document.getElementById("view-prox").style.display=prox?"block":"none";
  document.getElementById("view-hist").style.display=prox?"none":"block";
  document.getElementById("tab-prox").classList.toggle("active",prox);
  document.getElementById("tab-hist").classList.toggle("active",!prox);
  document.getElementById("closebar").style.display=prox?"block":"none";
  animateNext=true;
  if(prox) render(); else renderHist();
}

/* ---------- Confirmación ---------- */
function confirmar(msg,okTxt,cb){
  document.getElementById("sheetContent").innerHTML=`
    <h2>Confirmar</h2><p>${msg}</p>
    <div class="sheet-btns">
      <button class="btn-ghost" onclick="hideModal()">Cancelar</button>
      <button class="btn-primary" id="okConf">${okTxt}</button>
    </div>`;
  showModal();
  document.getElementById("okConf").onclick=()=>{ hideModal(); cb(); };
}

/* ---------- Cadena de seguimiento ---------- */
function chainHtml(t){
  const ch=t.seguimiento||[];
  if(!ch.length) return "";
  return `<div class="chain">
    <div class="chain-head" onclick="toggleChain('${t.id}')"><span id="ci_${t.id}">▸</span> Historial · ${ch.length} reunión${ch.length!=1?'es':''} previa${ch.length!=1?'s':''}</div>
    <div class="chain-body" id="cb_${t.id}">
      ${ch.map(s=>`<div class="chain-row"><b>${s.fecha}:</b> ${esc(s.decision)}</div>`).join("")}
    </div></div>`;
}
function toggleChain(id){
  const b=document.getElementById("cb_"+id); const i=document.getElementById("ci_"+id);
  b.classList.toggle("open"); i.textContent=b.classList.contains("open")?"▾":"▸";
}

/* ---------- Subtemas anidados ---------- */
function subtemasHtml(t){
  const subs=t.subtemas||[];
  return `<div class="subtemas">
    ${subs.map(s=>`<div class="subtema ${s.hecho?'done':''}">
        <div class="subcheck ${s.hecho?'on':''}" onclick="toggleSub('${t.id}','${s.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg></div>
        <span>${esc(s.titulo)}</span>
        <button class="subdel" onclick="borrarSub('${t.id}','${s.id}')">×</button>
      </div>`).join("")}
    <span class="add-sub" onclick="addSub('${t.id}')">+ punto</span>
  </div>`;
}
function guardarSubtemas(tid, subs){ FB.updateDoc(fdoc(COL_TEMAS,tid),{subtemas:subs}); }
function toggleSub(tid,sid){
  const t=temaById(tid); if(!t) return;
  t.subtemas=t.subtemas.map(s=>s.id===sid?{...s,hecho:!s.hecho}:s); render();
  guardarSubtemas(tid, t.subtemas);
}
function borrarSub(tid,sid){
  const t=temaById(tid); if(!t) return;
  t.subtemas=t.subtemas.filter(x=>x.id!==sid); render();
  guardarSubtemas(tid, t.subtemas);
}
function addSub(tid){
  pedirTexto("Nuevo punto","Ej: pedir presupuesto a 3 proveedores",(txt)=>{
    const t=temaById(tid); if(!t) return;
    if(!t.subtemas) t.subtemas=[];
    t.subtemas=[...t.subtemas,{id:genId(),titulo:txt,hecho:false}]; render();
    guardarSubtemas(tid, t.subtemas);
  });
}

/* ---------- Hacer seguimiento ---------- */
function hacerSeguimiento(id){
  const o=temaById(id); if(!o || o.seguido) return;
  let fechaLbl;
  if(state.fechaReunion){ const [y,m,d]=state.fechaReunion.split("-"); fechaLbl=`${d}/${m}/${y}`; }
  else fechaLbl=new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
  o.seguido=true; render();
  FB.updateDoc(fdoc(COL_TEMAS,id),{seguido:true});
  const nuevo = {
    titulo:o.titulo, detalle:o.detalle, prioridad:o.prioridad, propuestoPor:o.propuestoPor,
    tratado:false, decision:"", creadoEn:Date.now(), esSeguimiento:true, seguido:false,
    seguimiento:[...(o.seguimiento||[]), {fecha:fechaLbl, decision:o.decision||"(sin nota)"}],
    subtemas:(o.subtemas||[]).filter(s=>!s.hecho).map(s=>({id:genId(),titulo:s.titulo,hecho:false}))
  };
  animateNext=true;
  FB.addDoc(fcol(COL_TEMAS), nuevo);
}

/* ---------- Mini-modal de texto ---------- */
function pedirTexto(titulo,ph,cb){
  document.getElementById("sheetContent").innerHTML=`
    <h2>${titulo}</h2>
    <input id="txtInput" type="text" placeholder="${ph}" style="font-size:15px;letter-spacing:normal;text-align:left">
    <div class="sheet-btns">
      <button class="btn-ghost" onclick="hideModal()">Cancelar</button>
      <button class="btn-primary" id="txtOk">Agregar</button>
    </div>`;
  showModal();
  setTimeout(()=>document.getElementById("txtInput").focus(),100);
  const go=()=>{ const v=document.getElementById("txtInput").value.trim(); if(v){ hideModal(); cb(v); } };
  document.getElementById("txtOk").onclick=go;
  document.getElementById("txtInput").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
}
